<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Quantum Scientific Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.4.2/math.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0b0b0b;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:15px;
color:white;
}

/* CALCULATOR */

.calculator{
width:100%;
max-width:430px;
background:#111;
border-radius:30px;
padding:18px;
box-shadow:0 0 25px rgba(0,0,0,0.5);
}

/* DISPLAY */

.display{
width:100%;
height:140px;
background:#dfe7e6;
border-radius:20px;
padding:20px;
overflow:auto;
margin-bottom:20px;
color:black;
}

#expression{
font-size:22px;
word-wrap:break-word;
min-height:50px;
}

#result{
font-size:35px;
text-align:right;
margin-top:15px;
}

/* BUTTONS */

.buttons{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:12px;
}

/* GENERAL BUTTON */

button{
height:65px;
border:none;
border-radius:18px;
font-size:22px;
cursor:pointer;
transition:0.2s;
font-weight:500;
}

/* NORMAL */

.btn{
background:#2b2b35;
color:white;
}

/* OPERATOR */

.operator{
background:#373746;
color:#ffd54f;
}

/* SPECIAL */

.special{
background:#8b5cf6;
color:white;
}

/* EQUAL */

.equal{
background:#f59e0b;
color:black;
}

/* CLEAR */

.clear{
background:#ef4444;
color:white;
}

/* HOVER */

button:hover{
transform:scale(1.05);
}

/* SMALL BUTTON */

.small{
font-size:16px;
}

/* TITLE */

.title{
text-align:center;
font-size:24px;
margin-bottom:18px;
font-weight:700;
color:#c084fc;
}

</style>
</head>

<body>

<div class="calculator">

<div class="title">

Quantum Calculator

</div>

<!-- DISPLAY -->

<div class="display">

<div id="expression"></div>

<div id="result">0</div>

</div>

<!-- BUTTONS -->

<div class="buttons">

<button class="clear"
onclick="clearDisplay()">

AC

</button>

<button class="operator"
onclick="appendValue('(')">

(

</button>

<button class="operator"
onclick="appendValue(')')">

)

</button>

<button class="operator"
onclick="appendValue('/')">

÷

</button>

<button class="operator"
onclick="deleteLast()">

⌫

</button>

<button class="btn"
onclick="appendValue('7')">

7

</button>

<button class="btn"
onclick="appendValue('8')">

8

</button>

<button class="btn"
onclick="appendValue('9')">

9

</button>

<button class="operator"
onclick="appendValue('*')">

×

</button>

<button class="special small"
onclick="appendValue('sqrt(')">

√

</button>

<button class="btn"
onclick="appendValue('4')">

4

</button>

<button class="btn"
onclick="appendValue('5')">

5

</button>

<button class="btn"
onclick="appendValue('6')">

6

</button>

<button class="operator"
onclick="appendValue('-')">

−

</button>

<button class="special small"
onclick="appendValue('^')">

xʸ

</button>

<button class="btn"
onclick="appendValue('1')">

1

</button>

<button class="btn"
onclick="appendValue('2')">

2

</button>

<button class="btn"
onclick="appendValue('3')">

3

</button>

<button class="operator"
onclick="appendValue('+')">

+

</button>

<button class="special small"
onclick="appendValue('pi')">

π

</button>

<button class="btn"
onclick="appendValue('0')">

0

</button>

<button class="btn"
onclick="appendValue('.')">

.

</button>

<button class="special small"
onclick="appendValue('sin(')">

sin

</button>

<button class="special small"
onclick="appendValue('cos(')">

cos

</button>

<button class="equal"
onclick="calculate()">

=

</button>

<button class="special small"
onclick="appendValue('tan(')">

tan

</button>

<button class="special small"
onclick="appendValue('log(')">

log

</button>

<button class="special small"
onclick="appendValue('ln(')">

ln

</button>

<button class="special small"
onclick="appendValue('factorial(')">

x!

</button>

<button class="special small"
onclick="appendValue('abs(')">

|x|

</button>

</div>

</div>

<script>

let expression = "";

const expressionDisplay =
document.getElementById("expression");

const resultDisplay =
document.getElementById("result");

/* APPEND */

function appendValue(value){

expression += value;

expressionDisplay.innerText =
expression;

}

/* CLEAR */

function clearDisplay(){

expression = "";

expressionDisplay.innerText = "";

resultDisplay.innerText = "0";

}

/* DELETE */

function deleteLast(){

expression =
expression.slice(0,-1);

expressionDisplay.innerText =
expression;

}

/* CALCULATE */

function calculate(){

try{

const result =
math.evaluate(expression);

resultDisplay.innerText =
result;

}

catch{

resultDisplay.innerText =
"Error";

}

}

</script>

</body>
</html>
