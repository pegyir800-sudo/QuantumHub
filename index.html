<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Quantum hub</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
-webkit-tap-highlight-color:transparent;
}

:root{

--bg:#07111f;
--bg2:#0b1f35;
--card:rgba(255,255,255,0.08);
--border:rgba(255,255,255,0.12);
--primary:#00d9ff;
--text:#ffffff;

}

body{

width:100%;
height:100vh;

overflow:hidden;

background:
linear-gradient(
135deg,
var(--bg),
var(--bg2),
#10233a
);

display:flex;
justify-content:center;
align-items:center;

color:var(--text);

position:relative;

}

/* BACKGROUND GLOW */

.glow{

position:absolute;

border-radius:50%;

filter:blur(100px);

opacity:0.5;

animation:float 6s infinite ease-in-out;

}

.glow1{

width:300px;
height:300px;

background:#00d9ff;

top:-120px;
left:-120px;

}

.glow2{

width:280px;
height:280px;

background:#7a5cff;

bottom:-100px;
right:-100px;

animation-delay:2s;

}

@keyframes float{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(20px);
}

100%{
transform:translateY(0px);
}

}

/* APP CONTAINER */

.app{

width:100%;
max-width:430px;

height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:25px;

position:relative;
z-index:2;

}

/* SPLASH CARD */

.splash-card{

width:100%;

background:var(--card);

border:1px solid var(--border);

backdrop-filter:blur(15px);

border-radius:35px;

padding:40px 25px;

text-align:center;

box-shadow:
0 10px 40px rgba(0,0,0,0.45);

animation:show 1s ease;

position:relative;

overflow:hidden;

}

/* LIGHT EFFECT */

.splash-card::before{

content:"";

position:absolute;

width:220px;
height:220px;

background:rgba(255,255,255,0.05);

border-radius:50%;

top:-120px;
right:-120px;

}

/* LOGO */

.logo-area{

position:relative;

z-index:2;

}

.logo-circle{

width:130px;
height:130px;

margin:auto;

border-radius:35px;

background:
linear-gradient(
135deg,
#00d9ff,
#0077ff
);

display:flex;
justify-content:center;
align-items:center;

font-size:58px;

color:white;

box-shadow:
0 0 30px rgba(0,217,255,0.5),
0 0 80px rgba(0,217,255,0.25);

animation:pulse 3s infinite;

}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.06);
}

100%{
transform:scale(1);
}

}

.logo-circle i{

transform:rotate(-10deg);

}

/* APP NAME */

.app-name{

margin-top:28px;

font-size:34px;

font-weight:bold;

background:
linear-gradient(
to right,
#00d9ff,
#ffffff
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

/* MOTTO */

.motto{

margin-top:10px;

font-size:15px;

opacity:0.8;

letter-spacing:1px;

}

/* DESCRIPTION */

.description{

margin-top:20px;

line-height:1.8;

font-size:14px;

opacity:0.85;

}

/* LOADER */

.loader{

width:65px;
height:65px;

margin:35px auto 0;

border-radius:50%;

border:5px solid rgba(255,255,255,0.1);

border-top:5px solid var(--primary);

animation:spin 1s linear infinite;

}

@keyframes spin{

100%{
transform:rotate(360deg);
}

}

/* LOADING TEXT */

.loading-text{

margin-top:18px;

font-size:14px;

opacity:0.7;

animation:blink 1.5s infinite;

}

@keyframes blink{

0%{
opacity:0.3;
}

50%{
opacity:1;
}

100%{
opacity:0.3;
}

}

/* FOOTER */

.footer{

position:absolute;

bottom:20px;

left:0;
right:0;

text-align:center;

font-size:12px;

opacity:0.6;

}

/* ANIMATION */

@keyframes show{

from{

opacity:0;

transform:translateY(40px);

}

to{

opacity:1;

transform:translateY(0px);

}

}

/* MOBILE */

@media(max-width:500px){

.logo-circle{

width:115px;
height:115px;

font-size:50px;

}

.app-name{

font-size:30px;

}

.splash-card{

padding:35px 20px;

}

}

</style>

</head>

<body>

<!-- GLOW EFFECTS -->

<div class="glow glow1"></div>

<div class="glow glow2"></div>

<!-- APP -->

<div class="app">

<div class="splash-card">

<!-- LOGO -->

<div class="logo-area">

<div class="logo-circle">

<i class="fa-solid fa-brain"></i>

</div>

<h1 class="app-name">

QUANTUM STUDENTS HUB

</h1>

<p class="description">

Your smart AI-powered learning companion designed to help students grow daily, stay focused, and learn intelligently.

</p>

</div>

<!-- LOADER -->

<div class="loader"></div>

<p class="loading-text">

Initializing Smart Learning System...

</p>

</div>

</div>

<!-- FOOTER -->

<div class="footer">

© Quantum Learn AI<br>
Powered by Wise LTD

</div>


<script>
  // Wait 5 seconds then redirect
  setTimeout(() => {
    window.location.href = "new.html";
  }, 5000);
</script>







</body>
</html>
