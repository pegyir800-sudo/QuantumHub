<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quantum Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:white;
height:100vh;
overflow:hidden;
}

/* BACKGROUND GLOWS */

.blur1,
.blur2{
position:fixed;
border-radius:50%;
filter:blur(100px);
z-index:-1;
}

.blur1{
width:220px;
height:220px;
background:#7c3aed;
top:-50px;
left:-50px;
}

.blur2{
width:220px;
height:220px;
background:#06b6d4;
bottom:-50px;
right:-50px;
}

/* NAVBAR */

.navbar{
position:fixed;
top:0;
left:0;
width:100%;
height:60px;
display:flex;
justify-content:center;
align-items:center;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(255,255,255,0.1);
z-index:1000;
}

.logo{
font-size:20px;
font-weight:700;
}

/* MAIN */

.main{
position:absolute;
top:60px;
bottom:75px;
left:0;
right:0;
padding:10px;
display:flex;
justify-content:center;
align-items:center;
}

/* CALCULATOR */

.calculator{
width:100%;
max-width:420px;
height:100%;
display:flex;
flex-direction:column;
gap:8px;
}

/* DISPLAY */

.display-box{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(12px);
border-radius:18px;
padding:12px;
}

.mode{
font-size:11px;
color:#06b6d4;
margin-bottom:5px;
}

.display{
width:100%;
height:55px;
background:transparent;
border:none;
outline:none;
color:white;
font-size:24px;
text-align:right;
}

/* ARROWS */

.arrow-pad{
display:grid;
grid-template-columns:50px 50px 50px;
justify-content:center;
gap:5px;
}

.arrow-btn{
height:42px;
border:none;
border-radius:12px;
background:rgba(255,255,255,0.08);
color:white;
font-size:18px;
cursor:pointer;
}

.center-btn{
background:#7c3aed;
}

/* BUTTON GRID */

.buttons{
flex:1;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:6px;
}

.btn{
border:none;
border-radius:14px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
color:white;
font-size:14px;
font-weight:600;
cursor:pointer;
}

.btn:active{
transform:scale(0.96);
}

.scientific{
color:#06b6d4;
}

.operator{
color:#f8fafc;
background:rgba(124,58,237,0.25);
}

.del{
background:#ef4444;
}

.ac{
background:#22c55e;
}

.equal{
background:#7c3aed;
grid-column:span 2;
}

/* BOTTOM NAV */

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
height:75px;
display:flex;
justify-content:space-around;
align-items:center;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
border-top:1px solid rgba(255,255,255,0.1);
}

.bottom-nav a{
color:white;
font-size:22px;
text-decoration:none;
}

/* SMALL PHONES */

@media(max-height:700px){

.display{
font-size:20px;
height:45px;
}

.btn{
font-size:12px;
}

.arrow-btn{
height:36px;
}

}

</style>
</head>

<body>

<div class="blur1"></div>
<div class="blur2"></div>

<!-- NAVBAR -->

<nav class="navbar">
<div class="logo">
Quantum Calculator
</div>
</nav>

<!-- MAIN -->

<div class="main">

<div class="calculator">

<!-- DISPLAY -->

<div class="display-box">

<div class="mode">
DEG MODE
</div>

<input
type="text"
id="display"
class="display"
readonly>

</div>

<!-- ARROWS -->

<div class="arrow-pad">

<div></div>

<button class="arrow-btn">↑</button>

<div></div>

<button class="arrow-btn">←</button>

<button class="arrow-btn center-btn">●</button>

<button class="arrow-btn">→</button>

<div></div>

<button class="arrow-btn">↓</button>

<div></div>

</div>

<!-- BUTTONS -->

<div class="buttons">

<button class="btn scientific">CALC</button>
<button class="btn scientific">∫</button>
<button class="btn scientific">x⁻¹</button>
<button class="btn scientific">log</button>

<button class="btn scientific">√</button>
<button class="btn scientific">x²</button>
<button class="btn scientific">x^y</button>
<button class="btn scientific">ln</button>

<button class="btn scientific">sin</button>
<button class="btn scientific">cos</button>
<button class="btn scientific">tan</button>
<button class="btn scientific">hyp</button>

<button class="btn scientific">RCL</button>
<button class="btn scientific">ENG</button>
<button class="btn scientific">S⇔D</button>
<button class="btn operator">( )</button>

<button class="btn del">DEL</button>
<button class="btn ac">AC</button>
<button class="btn scientific">π</button>
<button class="btn scientific">e</button>

<button class="btn">7</button>
<button class="btn">8</button>
<button class="btn">9</button>
<button class="btn operator">÷</button>

<button class="btn">4</button>
<button class="btn">5</button>
<button class="btn">6</button>
<button class="btn operator">×</button>

<button class="btn">1</button>
<button class="btn">2</button>
<button class="btn">3</button>
<button class="btn operator">−</button>

<button class="btn">0</button>
<button class="btn">.</button>
<button class="btn">Ans</button>
<button class="btn operator">+</button>

<button class="btn equal">=</button>

</div>

</div>

</div>

<!-- BOTTOM NAV -->

<div class="bottom-nav">

<a href="new.html">⌂</a>

<a href="notes.html">📖</a>


<a href="stats.html">📊</a>

<a href="profile.html">👤</a>

</div>



<script>

const display = document.getElementById("display");

let lastAnswer = 0;
let bracketOpen = true;

/* INSERT TEXT */

function insertText(value){
display.value += value;
}

/* BUTTON CLICK EVENTS */

document.querySelectorAll(".btn").forEach(btn=>{

btn.addEventListener("click",()=>{

const value = btn.textContent.trim();

switch(value){

case "0":
case "1":
case "2":
case "3":
case "4":
case "5":
case "6":
case "7":
case "8":
case "9":
case ".":
insertText(value);
break;

case "+":
insertText("+");
break;

case "−":
insertText("-");
break;

case "×":
insertText("*");
break;

case "÷":
insertText("/");
break;

case "π":
insertText("π");
break;

case "e":
insertText("e");
break;

case "sin":
insertText("sin(");
break;

case "cos":
insertText("cos(");
break;

case "tan":
insertText("tan(");
break;

case "log":
insertText("log(");
break;

case "ln":
insertText("ln(");
break;

case "√":
insertText("√(");
break;

case "x²":
insertText("^2");
break;

case "x^y":
insertText("^");
break;

case "x⁻¹":
insertText("^-1");
break;

case "Ans":
insertText(lastAnswer);
break;

case "( )":

if(bracketOpen){
insertText("(");
}else{
insertText(")");
}

bracketOpen = !bracketOpen;

break;

case "DEL":

display.value =
display.value.slice(0,-1);

break;

case "AC":

display.value = "";

break;

case "=":

calculate();

break;

/* OPTIONAL BUTTONS */

case "CALC":
calculate();
break;

case "RCL":
insertText(lastAnswer);
break;

case "ENG":
insertText("e");
break;

case "hyp":
insertText("sinh(");
break;

case "S⇔D":
convertFractionDecimal();
break;

}

});

});

/* DEGREE FUNCTIONS */

function sinDeg(x){
return Math.sin(x*Math.PI/180);
}

function cosDeg(x){
return Math.cos(x*Math.PI/180);
}

function tanDeg(x){
return Math.tan(x*Math.PI/180);
}

/* CALCULATE */

function calculate(){

try{

let exp = display.value;

/* SYMBOL REPLACEMENTS */

exp = exp.replaceAll("π","Math.PI");
exp = exp.replaceAll(/(?<![a-zA-Z])e/g,"Math.E");

/* POWERS */

exp = exp.replace(
/(\d+(\.\d+)?)\^(-?\d+(\.\d+)?)/g,
"Math.pow($1,$3)"
);

/* ROOTS */

exp = exp.replaceAll("√(","Math.sqrt(");

/* LOG */

exp = exp.replaceAll(
/log\(/g,
"Math.log10("
);

exp = exp.replaceAll(
/ln\(/g,
"Math.log("
);

/* TRIG */

exp = exp.replaceAll(
/sin\(([^()]*)\)/g,
"sinDeg($1)"
);

exp = exp.replaceAll(
/cos\(([^()]*)\)/g,
"cosDeg($1)"
);

exp = exp.replaceAll(
/tan\(([^()]*)\)/g,
"tanDeg($1)"
);

/* HYPERBOLIC */

exp = exp.replaceAll(
/sinh\(([^()]*)\)/g,
"Math.sinh($1)"
);

/* EVALUATE */

let result = eval(exp);

if(
result === Infinity ||
result === -Infinity
){
throw new Error();
}

if(
typeof result === "number"
){
result = Number(
result.toFixed(12)
);
}

lastAnswer = result;

display.value = result;

}catch(error){

display.value = "Error";

}

}

/* FRACTION / DECIMAL */

function convertFractionDecimal(){

const current = display.value;

if(current.includes("/")){

try{

display.value =
eval(current);

}catch{}

return;

}

const num = parseFloat(current);

if(isNaN(num)) return;

let tolerance = 1.0E-6;
let h1=1;
let h2=0;
let k1=0;
let k2=1;
let b=num;

do{

let a=Math.floor(b);

let aux=h1;
h1=a*h1+h2;
h2=aux;

aux=k1;
k1=a*k1+k2;
k2=aux;

b=1/(b-a);

}while(
Math.abs(num-h1/k1) >
num*tolerance
);

display.value =
h1 + "/" + k1;

}

/* KEYBOARD SUPPORT */

document.addEventListener(
"keydown",
(e)=>{

if(
"0123456789.+-*/()"
.includes(e.key)
){
display.value += e.key;
}

if(e.key==="Enter"){
calculate();
}

if(e.key==="Backspace"){
display.value =
display.value.slice(0,-1);
}

}

);

</script>

</body>
</html>
