<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>Smart Notes - Quantum Study Hub</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:white;
overflow-x:hidden;
}

/* NAVBAR */

.navbar{
position:fixed;
top:0;
left:0;
width:100%;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,0.1);
z-index:1000;
}

.logo{
font-size:22px;
font-weight:700;
}

.back-btn{
color:white;
font-size:22px;
text-decoration:none;
}

/* CONTAINER */

.container{
padding:110px 20px 120px;
max-width:850px;
margin:auto;
}

/* NOTE BOX */

.note-box{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.1);
border-radius:25px;
padding:20px;
margin-bottom:25px;
backdrop-filter:blur(12px);
}

.note-box input{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
outline:none;
border-radius:15px;
background:rgba(255,255,255,0.08);
color:white;
font-size:16px;
}

.note-box textarea{
width:100%;
height:140px;
padding:15px;
border:none;
outline:none;
border-radius:15px;
resize:none;
background:rgba(255,255,255,0.08);
color:white;
font-size:15px;
margin-bottom:15px;
}

.note-box button{
width:100%;
padding:15px;
border:none;
border-radius:15px;
background:#7c3aed;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

.note-box button:hover{
transform:scale(1.02);
}

/* NOTES */

.notes-container{
display:flex;
flex-direction:column;
gap:20px;
}

.note{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.1);
padding:20px;
border-radius:25px;
backdrop-filter:blur(12px);
position:relative;
}

.note h3{
margin-bottom:10px;
}

.note p{
color:#cbd5e1;
line-height:1.7;
white-space:pre-wrap;
}

.delete-btn{
position:absolute;
top:15px;
right:15px;
background:#ef4444;
border:none;
width:38px;
height:38px;
border-radius:50%;
color:white;
cursor:pointer;
font-size:16px;
}

/* EMPTY TEXT */

.empty{
text-align:center;
color:#94a3b8;
margin-top:20px;
}

/* FOOTER */

footer{
text-align:center;
padding:30px;
color:#94a3b8;
font-size:14px;
}

</style>
</head>

<body>

<!-- NAVBAR -->

<nav class="navbar">

<div class="logo">
QuantumHub
</div>

<a href="new.html"
class="back-btn">

<i class="fas fa-arrow-left"></i>

</a>

</nav>

<!-- CONTENT -->

<div class="container">

<!-- ADD NOTE -->

<div class="note-box">

<input type="text"
id="title"
placeholder="Note Title">

<textarea
id="content"
placeholder="Write your note here..."></textarea>

<button onclick="addNote()">

Save Note

</button>

</div>

<!-- NOTES -->

<div class="notes-container"
id="notesContainer">

<p class="empty"
id="emptyText">

No notes yet.

</p>

</div>

</div>

<footer>

Quantum Study Hub © 2026

</footer>


<script>

const notesContainer=
document.getElementById("notesContainer");

const emptyText=
document.getElementById("emptyText");

const titleInput=
document.getElementById("title");

const contentInput=
document.getElementById("content");

let editIndex=null;

/* LOAD NOTES */

window.onload=()=>{

loadNotes();

};

/* ADD OR UPDATE NOTE */

function addNote(){

const title=titleInput.value;

const content=contentInput.value;

if(title==="" || content===""){

alert("Please fill all fields");

return;

}

let notes=
JSON.parse(localStorage.getItem("notes")) || [];

/* UPDATE */

if(editIndex!==null){

notes[editIndex]={

title:title,
content:content

};

editIndex=null;

}else{

/* ADD */

notes.push({

title:title,
content:content

});

}

localStorage.setItem(
"notes",
JSON.stringify(notes)
);

/* CLEAR INPUTS */

titleInput.value="";
contentInput.value="";

/* RELOAD */

loadNotes();

}

/* LOAD NOTES */

function loadNotes(){

let notes=
JSON.parse(localStorage.getItem("notes")) || [];

notesContainer.innerHTML="";

if(notes.length===0){

notesContainer.innerHTML=`

<p class="empty">

No notes yet.

</p>

`;

return;

}

notes.forEach((note,index)=>{

notesContainer.innerHTML+=`

<div class="note"
onclick="openNote(${index})">

<button class="delete-btn"
onclick="deleteNote(event,${index})">

<i class="fas fa-trash"></i>

</button>

<h3>${note.title}</h3>

<p>${note.content}</p>

</div>

`;

});

}

/* OPEN NOTE */

function openNote(index){

let notes=
JSON.parse(localStorage.getItem("notes")) || [];

titleInput.value=
notes[index].title;

contentInput.value=
notes[index].content;

/* SAVE EDIT INDEX */

editIndex=index;

/* SCROLL TO TOP */

window.scrollTo({

top:0,
behavior:"smooth"

});

}

/* DELETE NOTE */

function deleteNote(event,index){

event.stopPropagation();

let notes=
JSON.parse(localStorage.getItem("notes")) || [];

notes.splice(index,1);

localStorage.setItem(
"notes",
JSON.stringify(notes)
);

loadNotes();

}

</script>




</body>
</html>
