<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Quantum Hub - Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:white;
min-height:100vh;
overflow-x:hidden;
}

/* BACKGROUND GLOWS */
.blur1,.blur2{
position:fixed;
border-radius:50%;
filter:blur(120px);
z-index:-1;
}

.blur1{
width:250px;
height:250px;
background:#7c3aed;
top:-60px;
left:-60px;
}

.blur2{
width:250px;
height:250px;
background:#06b6d4;
bottom:-60px;
right:-60px;
}

/* HEADER */
.header{
display:flex;
align-items:center;
justify-content:space-between;
padding:18px;
}

.header h2{
font-size:20px;
}

.back-btn{
width:45px;
height:45px;
border:none;
border-radius:12px;
background:rgba(255,255,255,0.08);
color:white;
cursor:pointer;
}

/* PROFILE CARD */
.profile-card{
margin:10px 18px;
padding:20px;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.1);
border-radius:25px;
backdrop-filter:blur(15px);
}

.avatar{
width:70px;
height:70px;
border-radius:50%;
background:linear-gradient(135deg,#7c3aed,#06b6d4);
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:bold;
margin-bottom:15px;
}

.profile-card h3{
margin-bottom:5px;
}

.profile-card p{
color:#cbd5e1;
font-size:13px;
}

/* STATS GRID */
.stats{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:18px;
}

.stat{
background:rgba(255,255,255,0.08);
padding:18px;
border-radius:18px;
text-align:center;
border:1px solid rgba(255,255,255,0.1);
}

.stat h3{
font-size:20px;
margin-bottom:5px;
}

.stat p{
font-size:12px;
color:#cbd5e1;
}

/* FULL WIDTH CARD */
.card{
margin:0 18px 12px;
padding:18px;
background:rgba(255,255,255,0.08);
border-radius:20px;
border:1px solid rgba(255,255,255,0.1);
}

.card h4{
margin-bottom:10px;
}

/* QUICK LINKS */
.links{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:10px;
}

.link{
padding:14px;
border-radius:15px;
background:rgba(255,255,255,0.06);
text-align:center;
cursor:pointer;
text-decoration:none;
color:white;
font-size:13px;
}

.link i{
display:block;
font-size:18px;
margin-bottom:6px;
color:#06b6d4;
}

/* FOOTER */
footer{
text-align:center;
padding:25px;
color:#94a3b8;
font-size:13px;
}

</style>

</head>

<body>

<div class="blur1"></div>
<div class="blur2"></div>

<!-- HEADER -->
<div class="header">

<button class="back-btn" onclick="history.back()">
<i class="fa fa-arrow-left"></i>
</button>

<h2>My Profile</h2>

<div style="width:45px"></div>

</div>

<!-- PROFILE INFO -->
<div class="profile-card">

<div class="avatar" id="avatar">Q</div>

<h3 id="name">Student Name</h3>
<p id="school">School Name</p>
<p id="dept">Department</p>

</div>

<!-- STATS -->
<div class="stats">

<div class="stat">
<h3 id="notesCount">0</h3>
<p>Notes</p>
</div>

<div class="stat">
<h3 id="taskCount">0</h3>
<p>Tasks</p>
</div>

<div class="stat">
<h3 id="completedCount">0</h3>
<p>Completed</p>
</div>

<div class="stat">
<h3 id="avgScore">0%</h3>
<p>Avg Score</p>
</div>

</div>

<!-- DETAILS -->
<div class="card">

<h4>Student Details</h4>

<p><b>Country:</b> <span id="country">-</span></p>
<p><b>Exam Year:</b> <span id="year">-</span></p>

</div>

<!-- QUICK LINKS -->
<div class="card">

<h4>Quick Access</h4>

<div class="links">

<a class="link" href="notes.html">
<i class="fa fa-book"></i>
Notes
</a>

<a class="link" href="assignment.html">
<i class="fa fa-tasks"></i>
Assignments
</a>

<a class="link" href="gpa.html">
<i class="fa fa-calculator"></i>
GPA Calc
</a>

<a class="link" href="stats.html">
<i class="fa fa-chart-line"></i>
Stats
</a>

</div>

</div>

<footer>
© Quantum Hub 2026
</footer>

<script>

/* LOAD PROFILE DATA */

const name = localStorage.getItem("studentName") || "Student";
const school = localStorage.getItem("schoolName") || "School";
const dept = localStorage.getItem("selectedDepartment") || "No Department";
const country = localStorage.getItem("country") || "-";
const year = localStorage.getItem("examYear") || "-";

/* NOTES */
const notes = JSON.parse(localStorage.getItem("notes")) || [];

/* TASKS */
const tasks = JSON.parse(localStorage.getItem("plannerTasks")) || [];

/* SCORES */
const scores = JSON.parse(localStorage.getItem("scores")) || {};

/* CALCULATIONS */

/* Notes */
document.getElementById("notesCount").innerText = notes.length;

/* Tasks */
document.getElementById("taskCount").innerText = tasks.length;

/* Completed Tasks */
const completed = tasks.filter(t => t.completed).length;
document.getElementById("completedCount").innerText = completed;

/* Average Score */
let avg = 0;
let subjects = Object.keys(scores);

if(subjects.length > 0){
let total = 0;

subjects.forEach(s => {
total += Number(scores[s]) || 0;
});

avg = (total / subjects.length).toFixed(1);
}

document.getElementById("avgScore").innerText = avg + "%";

/* DISPLAY INFO */

document.getElementById("name").innerText = name;
document.getElementById("school").innerText = school;
document.getElementById("dept").innerText = dept;
document.getElementById("country").innerText = country;
document.getElementById("year").innerText = year;

/* AVATAR INITIAL */
document.getElementById("avatar").innerText =
name.charAt(0).toUpperCase();

</script>

</body>
</html>
